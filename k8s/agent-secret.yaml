# ─────────────────────────────────────────────────────────────────────────────
# Watchmen eBPF Agent — Secret template
#
# Populate agent_secret with a shared secret that the DaemonSet pods use to
# authenticate with the Watchmen server.
#
#   kubectl create secret generic watchmen-agent-secret \
#     --from-literal=agent_secret="$(openssl rand -hex 32)" \
#     -n watchmen
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: watchmen-agent-secret
  namespace: watchmen
  labels:
    app.kubernetes.io/name: watchmen
type: Opaque
stringData:
  agent_secret: "REPLACE_ME"
