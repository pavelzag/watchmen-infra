apiVersion: apps/v1
kind: Deployment
metadata:
  name: wm-echo
  namespace: watchmen
  labels:
    app: wm-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wm-echo
  template:
    metadata:
      labels:
        app: wm-echo
    spec:
      containers:
        # ── nginx reverse-proxy sidecar ──────────────────────────────────────
        # Receives external traffic on :80, logs JSON access logs to stdout,
        # proxies to the echo app on localhost:8080.
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

        # ── echo app ─────────────────────────────────────────────────────────
        # Listens on :8080 (cluster-internal only). Logs [req] lines to stderr.
        - name: echo
          image: gcr.io/watchmen-test-488807/wm-echo:v3
          ports:
            - containerPort: 8080
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: wm-echo-db
                  key: dsn
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: nginx-config
          configMap:
            name: wm-echo-nginx
