apiVersion: v1
kind: Service
metadata:
  name: wm-echo
  namespace: watchmen
  labels:
    app: wm-echo
  annotations:
    # Tag so Watchmen's entry-point scanner can identify this as a test service
    watchmen.io/role: "test-echo"
spec:
  type: LoadBalancer
  selector:
    app: wm-echo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80   # nginx sidecar (was 8080 / echo direct)
