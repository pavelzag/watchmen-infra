# ─────────────────────────────────────────────────────────────────────────────
# Watchmen — Secret template
#
# DO NOT commit real values. Populate with one of:
#   a) kubectl create secret generic watchmen-env --from-env-file=.env.production -n watchmen
#   b) External Secrets Operator (ESO) syncing from GCP Secret Manager / AWS SM / Vault
#   c) Sealed Secrets (kubeseal)
#   d) Fill in the base64-encoded placeholders below and apply.
#
# Base64 encode a value:  echo -n 'my-value' | base64
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: watchmen-env
  namespace: watchmen
  labels:
    app.kubernetes.io/name: watchmen
type: Opaque
stringData:
  # ── NextAuth ──────────────────────────────────────────────────────────────
  # Generate: openssl rand -base64 32
  AUTH_SECRET: "REPLACE_ME"

  # ── Google OAuth ──────────────────────────────────────────────────────────
  # Create at console.cloud.google.com → APIs & Services → Credentials
  GOOGLE_CLIENT_ID: "REPLACE_ME.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME"

  # ── Access control (choose one) ───────────────────────────────────────────
  # Comma-separated emails:
  ALLOWED_EMAILS: "admin@example.com"
  # OR restrict by domain (comment out ALLOWED_EMAILS above):
  # ALLOWED_DOMAIN: "example.com"

  # ── GCP ───────────────────────────────────────────────────────────────────
  USE_MOCK_DATA: "false"
  # Comma-separated project IDs, or leave empty if GCP_ORG_ID is set
  GCP_PROJECTS: "my-project-id,another-project"
  # Optional: enumerate all projects in an organisation
  # GCP_ORG_ID: "123456789"
  # base64 -i service-account.json | tr -d '\n'
  GCP_SERVICE_ACCOUNT_KEY: "REPLACE_ME_BASE64_SA_KEY"

  # ── Database (any PostgreSQL-compatible connection string) ─────────────────
  # Examples:
  #   Neon:         postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require
  #   Cloud SQL:    postgresql://user:pass@/dbname?host=/cloudsql/project:region:instance
  #   Self-hosted:  postgresql://user:pass@postgres-svc:5432/watchmen
  POSTGRES_URL: "postgresql://REPLACE_ME"
