apiVersion: v1
kind: Namespace
metadata:
  name: ${WATCHMEN_NAMESPACE}
  labels:
    name: ${WATCHMEN_NAMESPACE}
---
apiVersion: v1
kind: Secret
metadata:
  name: watchmen-agent-secret
  namespace: ${WATCHMEN_NAMESPACE}
  labels:
    app.kubernetes.io/name: watchmen
    app.kubernetes.io/component: ebpf-agent
type: Opaque
stringData:
  agent_secret: ${WATCHMEN_AGENT_SECRET}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: watchmen-trace-go-app
  namespace: ${WATCHMEN_NAMESPACE}
  labels:
    app.kubernetes.io/name: watchmen-trace-go-app
    app.kubernetes.io/part-of: watchmen
data:
  main.go: |
    package main

    import (
      "context"
      "encoding/json"
      "log"
      "net/http"
      "os"
      "strings"
      "sync"
      "time"
    )

    type downstreamResult struct {
      URL string `json:"url"`
      StatusCode int `json:"statusCode,omitempty"`
      Body string `json:"body,omitempty"`
      Error string `json:"error,omitempty"`
    }

    func main() {
      serviceName := env("SERVICE_NAME", "watchmen-trace-app")
      listenAddr := env("LISTEN_ADDR", ":8080")
      downstreams := splitCSV(os.Getenv("DOWNSTREAM_URLS"))
      client := &http.Client{Timeout: 2 * time.Second}

      mux := http.NewServeMux()
      mux.HandleFunc("/health", func(w http.ResponseWriter, r *http.Request) {
        w.WriteHeader(http.StatusOK)
        _, _ = w.Write([]byte("ok\n"))
      })
      mux.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {
        requestID := r.Header.Get("X-Request-Id")
        if requestID == "" {
          requestID = time.Now().UTC().Format("20060102T150405.000000000")
        }

        respondJSON(w, map[string]any{
          "service": serviceName,
          "path": r.URL.Path,
          "requestId": requestID,
          "downstreams": callDownstreams(r.Context(), client, downstreams, serviceName, requestID),
          "time": time.Now().UTC().Format(time.RFC3339Nano),
        })
      })
      mux.HandleFunc("/work", func(w http.ResponseWriter, r *http.Request) {
        requestID := r.Header.Get("X-Request-Id")
        if requestID == "" {
          requestID = time.Now().UTC().Format("20060102T150405.000000000")
        }

        respondJSON(w, map[string]any{
          "service": serviceName,
          "path": r.URL.Path,
          "from": r.URL.Query().Get("from"),
          "requestId": requestID,
          "downstreams": callDownstreams(r.Context(), client, downstreams, serviceName, requestID),
          "time": time.Now().UTC().Format(time.RFC3339Nano),
        })
      })

      log.Printf("starting %s on %s with downstreams=%q", serviceName, listenAddr, downstreams)
      log.Fatal(http.ListenAndServe(listenAddr, logRequests(serviceName, mux)))
    }

    func callDownstreams(ctx context.Context, client *http.Client, downstreams []string, serviceName, requestID string) []downstreamResult {
      results := make([]downstreamResult, len(downstreams))
      var wg sync.WaitGroup

      for i, downstream := range downstreams {
        wg.Add(1)
        go func(i int, downstream string) {
          defer wg.Done()
          req, err := http.NewRequestWithContext(ctx, http.MethodGet, downstream+"?from="+serviceName, nil)
          if err != nil {
            results[i] = downstreamResult{URL: downstream, Error: err.Error()}
            return
          }
          req.Header.Set("X-Request-Id", requestID)
          resp, err := client.Do(req)
          if err != nil {
            results[i] = downstreamResult{URL: downstream, Error: err.Error()}
            return
          }
          defer resp.Body.Close()
          body := make([]byte, 512)
          n, _ := resp.Body.Read(body)
          results[i] = downstreamResult{URL: downstream, StatusCode: resp.StatusCode, Body: string(body[:n])}
        }(i, downstream)
      }

      wg.Wait()
      return results
    }

    func logRequests(serviceName string, next http.Handler) http.Handler {
      return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
        start := time.Now()
        next.ServeHTTP(w, r)
        log.Printf("service=%s method=%s path=%s remote=%s duration=%s", serviceName, r.Method, r.URL.RequestURI(), r.RemoteAddr, time.Since(start))
      })
    }

    func respondJSON(w http.ResponseWriter, payload any) {
      w.Header().Set("Content-Type", "application/json")
      if err := json.NewEncoder(w).Encode(payload); err != nil {
        http.Error(w, err.Error(), http.StatusInternalServerError)
      }
    }

    func env(key, fallback string) string {
      value := os.Getenv(key)
      if value == "" {
        return fallback
      }
      return value
    }

    func splitCSV(value string) []string {
      if value == "" {
        return nil
      }
      parts := strings.Split(value, ",")
      out := make([]string, 0, len(parts))
      for _, part := range parts {
        part = strings.TrimSpace(part)
        if part != "" {
          out = append(out, part)
        }
      }
      return out
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchmen-trace-main
  namespace: ${WATCHMEN_NAMESPACE}
  labels:
    app: watchmen-trace-main
    app.kubernetes.io/name: watchmen-trace-main
    app.kubernetes.io/part-of: watchmen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchmen-trace-main
  template:
    metadata:
      labels:
        app: watchmen-trace-main
        app.kubernetes.io/name: watchmen-trace-main
        app.kubernetes.io/part-of: watchmen
    spec:
      initContainers:
        - name: build
          image: ${TRACE_TEST_IMAGE}
          command: ["go", "build", "-o", "/bin-app/watchmen-trace-app", "/app/main.go"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: app-source
              mountPath: /app
              readOnly: true
            - name: app-bin
              mountPath: /bin-app
      containers:
        - name: app
          image: alpine:3.20
          command: ["/bin-app/watchmen-trace-app"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: watchmen-trace-main
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DOWNSTREAM_URLS
              value: http://watchmen-trace-worker-a:80/work,http://watchmen-trace-worker-b:80/work
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app-bin
              mountPath: /bin-app
              readOnly: true
      volumes:
        - name: app-source
          configMap:
            name: watchmen-trace-go-app
            items:
              - key: main.go
                path: main.go
        - name: app-bin
          emptyDir: {}
---
