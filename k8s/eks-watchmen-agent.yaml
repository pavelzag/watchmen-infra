apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: watchmen-ebpf-agent
  namespace: ${WATCHMEN_NAMESPACE}
  labels:
    app.kubernetes.io/name: watchmen
    app.kubernetes.io/component: ebpf-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: watchmen
      app.kubernetes.io/component: ebpf-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: watchmen
        app.kubernetes.io/component: ebpf-agent
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: install
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache ca-certificates >/dev/null
              wget -qO /opt/watchmen/watchmen-ebpf-agent --timeout=30 "$WATCHMEN_AGENT_BINARY_URL"
              chmod 0755 /opt/watchmen/watchmen-ebpf-agent
          env:
            - name: WATCHMEN_AGENT_BINARY_URL
              value: ${WATCHMEN_AGENT_BINARY_URL}
          volumeMounts:
            - name: opt
              mountPath: /opt/watchmen
      containers:
        - name: agent
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache ca-certificates >/dev/null

              for i in 1 2 3 4 5 6; do
                wget -qO- --timeout=2 "$WATCHMEN_HEALTH_URL" >/dev/null 2>&1 && break
                echo "waiting for server..."
                sleep 10
              done

              KERNEL="$(uname -r 2>/dev/null || echo '')"
              PAYLOAD='{"clusterName":"'$CLUSTER_NAME'","projectId":"'$AWS_ACCOUNT_ID'","location":"'$AWS_REGION'","nodeName":"'$WATCHMEN_AGENT_ID'","agentSecret":"'$AGENT_SECRET'","agentVersion":"'$AGENT_VERSION'","kernelVersion":"'"$KERNEL"'"}'

              wget -qO- --timeout=5 --header="Content-Type: application/json" \
                --post-data="$PAYLOAD" \
                "$REGISTER_URL" >/dev/null || echo "registration skipped (server unreachable)"

              exec /opt/watchmen/watchmen-ebpf-agent
          env:
            - name: CLUSTER_NAME
              value: ${EKS_CLUSTER_NAME}
            - name: AWS_ACCOUNT_ID
              value: ${AWS_ACCOUNT_ID}
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: AGENT_VERSION
              value: ${WATCHMEN_AGENT_VERSION}
            - name: REGISTER_URL
              value: ${WATCHMEN_API_URL}/agents/k8s/register
            - name: WATCHMEN_ENDPOINT
              value: ${WATCHMEN_API_URL}/agents/events
            - name: WATCHMEN_HEALTH_URL
              value: ${WATCHMEN_API_URL}/health
            - name: WATCHMEN_AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: watchmen-agent-secret
                  key: agent_secret
            - name: WATCHMEN_VERBOSE
              value: ${WATCHMEN_VERBOSE}
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "0"
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: opt
              mountPath: /opt/watchmen
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: tracefs
              mountPath: /sys/kernel/tracing
      volumes:
        - name: opt
          emptyDir: {}
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
